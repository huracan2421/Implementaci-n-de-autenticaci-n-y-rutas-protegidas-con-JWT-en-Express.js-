<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Grupo 6</title>
  <style>
    body {font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;}
    .card {background: white; padding: 45px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center;}
    h2 {color: #4a3f9a; margin-bottom: 30px;}
    input {width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box;}
    button {background: #4a3f9a; color: white; border: none; padding: 14px; width: 100%; border-radius: 10px; font-size: 1.1em; cursor: pointer;}
    button:hover {background: #5a4fc0;}
    #mensaje {margin-top: 15px; padding: 12px; border-radius: 10px; font-weight: bold;}
  </style>
</head>
<body>
  <div class="card">
    <h2>🔐 Acceso Seguro - Grupo 6</h2>
    
    <input type="text" id="username" placeholder="Usuario" value="">
    <input type="password" id="password" placeholder="Contraseña" value="">
    
    <button onclick="login()">Ingresar</button>
    
    <div id="mensaje"></div>
  </div>

  <script>
    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const mensaje = document.getElementById('mensaje');

      const res = await fetch('http://localhost:3000/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ username, password }),
        credentials: 'include'
      });

      if (res.ok) {
        mensaje.style.backgroundColor = '#d4edda';
        mensaje.style.color = '#155724';
        mensaje.textContent = '✅ Login exitoso - Redirigiendo...';
        
        setTimeout(() => { window.location.href = '/protected'; }, 1300);
      } else {
        const data = await res.json();
        mensaje.style.backgroundColor = '#f8d7da';
        mensaje.style.color = '#721c24';
        mensaje.textContent = '❌ ' + (data.message || 'Credenciales incorrectas.');
      }
    }
  </script>
</body>
</html>
