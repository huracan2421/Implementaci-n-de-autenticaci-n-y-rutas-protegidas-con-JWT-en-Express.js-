<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruta Protegida - Grupo 6</title>
  <style>
    body {font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;}
    .card {background: white; padding: 50px 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.25); width: 100%; max-width: 460px; text-align: center;}
    h1 {color: #27ae60; margin-bottom: 8px;}
    .subtitle {color: #555; font-size: 1.2em; margin-bottom: 30px;}
    .success {color: #27ae60; font-size: 1.6em; font-weight: bold; margin: 15px 0;}
    .info-box {background: #f0f4ff; padding: 20px; border-radius: 12px; margin: 25px 0; text-align: left;}
    .logout-btn {background: #e74c3c; color: white; border: none; padding: 15px 40px; border-radius: 10px; font-size: 1.1em; cursor: pointer; margin-top: 20px;}
    .logout-btn:hover {background: #c0392b;}
  </style>
</head>
<body>
  <div class="card">
    <h1>✅ Acceso Autorizado</h1>
    <p class="subtitle">Ruta protegida - Grupo 6</p>
    <div class="success">Bienvenido al sistema</div>
    
    <div class="info-box">
      <p><strong>Usuario:</strong> grupo6</p>
      <p><strong>Rol:</strong> admin</p>
      <p><strong>ID:</strong> 1</p>
    </div>
    
    <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
  </div>

  <script>
    async function logout() {
      await fetch('http://localhost:3000/logout', { 
        method: 'POST', 
        credentials: 'include' 
      });
      window.location.href = '/';
    }
  </script>
</body>
</html>
